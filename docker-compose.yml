services:
  minecraft:
    image: itzg/minecraft-server
    container_name: poiesis-minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "NEOFORGE"
      NEOFORGE_VERSION: "21.1.219"
      MINECRAFT_VERSION: "1.21.1"
      PACKWIZ_URL: "https://raw.githubusercontent.com/codecraft3r/packwiz-modpack/master/pack.toml"
      SERVER_NAME: "Poiesis Modded Server"
      MEMORY: "4G"
    volumes:
      - mc-data:/data

volumes:
  mc-data:
