name: Release Modpack

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh index
        run: packwiz refresh

      - name: Build Modrinth pack
        run: |
          packwiz modrinth export -o .
          ls -la *.mrpack

      - name: Create MultiMC instance package
        run: |
          # Download packwiz-installer-bootstrap
          curl -sL https://github.com/packwiz/packwiz-installer-bootstrap/releases/latest/download/packwiz-installer-bootstrap.jar -o packwiz-installer-bootstrap.jar
          
          # Create instance folder structure
          mkdir -p "Poiesis Modded.multimc-instance/.minecraft"
          curl -sL https://github.com/packwiz/packwiz-installer-bootstrap/releases/latest/download/packwiz-installer-bootstrap.jar -o "Poiesis Modded.multimc-instance/.minecraft/"
          
          # Create instance config
          cat > "Poiesis Modded.multimc-instance"/instance.cfg << 'CFGs'
name=Poiesis Modded
iconName=Default
notes=Auto-updating modpack via packwiz
MCVersion=1.21.1
ForgeVersion=21.1.219
LWJGLVersion=3.3.4
javaArgs=-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch
CFGs
          
          # Create pack.json for packwiz
          cat > "Poiesis Modded.multimc-instance"/pack.json << 'PKG'
{
    "packLocation": {
        "url": "https://raw.githubusercontent.com/codecraft3r/packwiz-modpack/master/pack.toml"
    }
}
PKG
          
          # Create README
          cat > "Poiesis Modded.multimc-instance"/README.txt << 'RDT'
Poiesis Modded MultiMC Instance
====================

HOW TO USE:
1. Install MultiMC from https://multimc.org/
2. Create new instance → Name: "Poiesis Modded" → Minecraft: 1.21.1 → NeoForge: 21.1.219
3. This instance folder IS the pack - you can import it directly or:
4. Just launch and the packwiz-installer will auto-download mods!
RDT
          
          # Zip it up
          zip -r "Poiesis Modded.multimc.instance.zip" "Poiesis Modded.multimc-instance"
          ls -la *.zip

      - name: Upload Modrinth pack
        uses: softprops/action-gh-release@v2
        with:
          files: '*.mrpack'
          asset_name: Poiesis Modded.mrpack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MultiMC instance
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          asset_name: Poiesis Modded-MultiMC-Instance.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
