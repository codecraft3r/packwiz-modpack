name: Release Modpack

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh index
        run: packwiz refresh

      - name: Build Modrinth pack
        run: |
          packwiz modrinth export -o "Poiesis Modded.mrpack"
          ls -la *.mrpack

      - name: Create MultiMC instance package
        run: |
          mkdir -p "Poiesis Modded.multimc-instance/.minecraft"
          curl -sL https://github.com/packwiz/packwiz-installer-bootstrap/releases/latest/download/packwiz-installer-bootstrap.jar -o "Poiesis Modded.multimc-instance/.minecraft/packwiz-installer-bootstrap.jar"
          printf 'name=Poiesis Modded\niconName=Default\nnotes=Auto-updating modpack via packwiz\nMCVersion=1.21.1\nForgeVersion=21.1.219\nLWJGLVersion=3.3.4\njavaArgs=-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch\n' > "Poiesis Modded.multimc-instance/instance.cfg"
          printf '{\n    "packLocation": {\n        "url": "https://raw.githubusercontent.com/codecraft3r/packwiz-modpack/master/pack.toml"\n    }\n}\n' > "Poiesis Modded.multimc-instance/pack.json"
          printf 'Poiesis Modded MultiMC Instance\n====================\n\nHOW TO USE:\n1. Install MultiMC from https://multimc.org/\n2. Create new instance → Name: "Poiesis Modded" → Minecraft: 1.21.1 → NeoForge: 21.1.219\n3. This instance folder IS the pack - you can import it directly or:\n4. Just launch and the packwiz-installer will auto-download mods!\n' > "Poiesis Modded.multimc-instance/README.txt"
          zip -r "Poiesis Modded-MultiMC-Instance.zip" "Poiesis Modded.multimc-instance"
          ls -la *.zip

      - name: Upload Modrinth pack
        uses: softprops/action-gh-release@v2
        with:
          files: '*.mrpack'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MultiMC instance
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
