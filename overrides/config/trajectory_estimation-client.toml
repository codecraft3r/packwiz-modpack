[general]
	#Default enable for rendering trajectory prediction.
	"Render Trajectory" = true
	#If the current trajectory can hit target, play "Ding" sound to remind player.
	"Target Hit Sound" = true
	#Enable for cube shape trajectory.
	"Cube Trajectory" = true
	#Enable for line shape trajectory.
	"Line Trajectory" = false
	#Enable for hit location plane.
	"Hit Location Plane" = true
	#Set cube color R.
	# Default: 255
	# Range: 0 ~ 255
	"Cube Color R" = 255
	#Set cube color G.
	# Default: 255
	# Range: 0 ~ 255
	"Cube Color G" = 255
	#Set cube color B.
	# Default: 255
	# Range: 0 ~ 255
	"Cube Color B" = 255
	#Set cube color A.
	# Default: 40
	# Range: 0 ~ 255
	"Cube Color A" = 40
	#Set cube size.
	# Default: 0.1
	# Range: 0.0 ~ 10.0
	"Cube Size" = 0.1
	#Set line color R.
	# Default: 255
	# Range: 0 ~ 255
	"Line Color R" = 255
	#Set line color G.
	# Default: 255
	# Range: 0 ~ 255
	"Line Color G" = 255
	#Set line color B.
	# Default: 255
	# Range: 0 ~ 255
	"Line Color B" = 255
	#Set line color A.
	# Default: 255
	# Range: 0 ~ 255
	"Line Color A" = 255
	#Set line width.
	# Default: 4.0
	# Range: 1.0 ~ 10.0
	"Line Width" = 4.0

